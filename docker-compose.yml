services:
  plantuml:
    image: plantuml/plantuml-server:jetty
    restart: unless-stopped
    expose:
      - "8080"

  app:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PLANTUML_URL: http://plantuml:8080
    depends_on:
      - plantuml
